name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # 1. 强制安装正确的 Node 版本
      - name: Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'

      # 2. 手动安装依赖（这样可以确保环境已经切换到 v22）
      - name: Install dependencies
        run: npm install

      # 3. 使用 Astro 插件进行构建（关键：让它直接用我们装好的环境）
      - name: Build with Astro
        uses: withastro/action@v2
        # 注意：这里我们移除了 explicit 的 package-manager 声明
        # 因为我们在上一步已经处理好了环境

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
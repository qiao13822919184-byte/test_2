name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # 关键纠错点 1：手动强制安装 Node 22
      - name: Install Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 关键纠错点 2：在运行构建之前先手动安装依赖
      - name: Install dependencies
        run: npm install

      # 关键纠错点 3：调用 Astro 插件，并告知它不要再重复安装依赖
      - name: Build with Astro
        uses: withastro/action@v2
        # 注意：这里我们不再需要 with: package-manager，
        # 因为我们在上一步已经安装好了，插件会自动识别构建产物。

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4